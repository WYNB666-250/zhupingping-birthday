<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>祝朱平平女士生日快乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    min-height: 100vh;
    overflow-x: hidden;
    background: radial-gradient(ellipse at center, #a8001a 0%, #5c000a 100%);
    font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .bg-pattern {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,215,0,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 60%, rgba(255,215,0,0.04) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(255,215,0,0.05) 0%, transparent 40%);
  }

  #particles {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }

  #fireworks {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
  }

  .main-content {
    position: relative; z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    width: 100%;
    max-width: 500px;
  }

  .avatar-wrapper {
    position: relative;
    width: min(180px, 40vw);
    height: min(180px, 40vw);
    margin-bottom: 30px;
  }

  .avatar-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid transparent;
    background: conic-gradient(from 0deg, #FFD700, #FFF8DC, #DAA520, #FFD700) border-box;
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
    animation: ringRotate 3s linear infinite;
  }

  @keyframes ringRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .avatar-img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,215,0,0.2);
  }

  .blessing {
    text-align: center;
    margin-bottom: 16px;
  }

  .blessing-main {
    font-size: min(48px, 10vw);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.4;
    background: linear-gradient(180deg, #FFF8DC 0%, #FFD700 30%, #DAA520 70%, #B8860B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)) drop-shadow(0 2px 4px rgba(139,0,0,0.5));
    animation: textShine 2s ease-in-out infinite alternate;
  }

  @keyframes textShine {
    0% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)) drop-shadow(0 2px 4px rgba(139,0,0,0.5)); }
    100% { filter: drop-shadow(0 0 35px rgba(255,215,0,0.9)) drop-shadow(0 2px 6px rgba(139,0,0,0.7)); }
  }

  .blessing-sub {
    font-size: min(22px, 5vw);
    color: #FFD700;
    margin-top: 12px;
    letter-spacing: 4px;
    opacity: 0.9;
    animation: fadeInUp 1.5s ease-out;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 0.9; transform: translateY(0); }
  }

  .footer-msg {
    margin-top: 36px;
    color: rgba(255,215,0,0.7);
    font-size: min(16px, 4vw);
    text-align: center;
    line-height: 1.8;
    letter-spacing: 2px;
    animation: fadeInUp 2s ease-out;
  }

  .tap-hint {
    position: fixed; bottom: 30px; z-index: 15;
    color: rgba(255,215,0,0.6);
    font-size: 14px;
    letter-spacing: 2px;
    animation: bounce 1.5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-8px); opacity: 0.8; }
  }

  @media (max-width: 400px) {
    .blessing-main { font-size: 38px; }
    .blessing-sub { font-size: 18px; }
  }

  @media (min-width: 768px) {
    .blessing-main { font-size: 64px; }
    .blessing-sub { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>
<canvas id="particles"></canvas>
<canvas id="fireworks"></canvas>

<div class="main-content">
  <div class="avatar-wrapper">
    <div class="avatar-ring"></div>
    <img class="avatar-img" src="avatar.jpg" alt="朱平平女士">
  </div>

  <div class="blessing">
    <div class="blessing-main">
      祝福美丽的<br>朱平平女士<br>生日快乐
    </div>
    <div class="blessing-sub">永远年轻美丽</div>
  </div>

  <div class="footer-msg">
    愿时光温柔<br>岁月长青
  </div>
</div>

<div class="tap-hint">点击屏幕放烟花</div>

<script>
// ====== 浮动粒子 ======
(function() {
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var w, h;
  var particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 2 + 1,
      speed: Math.random() * 0.5 + 0.2,
      opacity: Math.random() * 0.6 + 0.2,
      phase: Math.random() * Math.PI * 2
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    var t = Date.now() / 1000;
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.y -= p.speed;
      if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
      var alpha = p.opacity * (0.6 + 0.4 * Math.sin(t * 2 + p.phase));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,215,0,' + alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ====== 烟花 ======
(function() {
  var canvas = document.getElementById('fireworks');
  var ctx = canvas.getContext('2d');
  var w, h;
  var fireworks = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function randColor() {
    var c = ['#FFD700','#FF6347','#FF4500','#FFA500','#FF69B4',
      '#FF1493','#FFFFFF','#ffff00','#ff8800','#FFD700'];
    return c[Math.floor(Math.random() * c.length)];
  }

  function h2r(hex, a) {
    return 'rgba(' + parseInt(hex.slice(1,3),16) + ','
      + parseInt(hex.slice(3,5),16) + ','
      + parseInt(hex.slice(5,7),16) + ',' + a.toFixed(2) + ')';
  }

  function boom(x, y) {
    var n = 60 + Math.floor(Math.random() * 50);
    var batch = [];
    for (var i = 0; i < n; i++) {
      var ang = (Math.PI * 2 * i) / n + (Math.random() - 0.5) * 0.6;
      var spd = Math.random() * 7 + 2;
      batch.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1, decay: Math.random() * 0.015 + 0.01,
        color: randColor(),
        size: Math.random() * 4 + 2
      });
    }
    fireworks.push(batch);
    if (fireworks.length > 25) fireworks.shift();
  }

  setInterval(function() {
    ctx.clearRect(0, 0, w, h);
    for (var i = fireworks.length - 1; i >= 0; i--) {
      var fw = fireworks[i], alive = false;
      for (var j = 0; j < fw.length; j++) {
        var p = fw[j];
        if (p.life <= 0) continue;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life -= p.decay;
        if (p.life <= 0) continue;
        // glow
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = h2r(p.color, p.life * 0.12);
        ctx.fill();
        // core
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = h2r(p.color, p.life);
        ctx.fill();
      }
      if (!alive) fireworks.splice(i, 1);
    }
  }, 1000 / 50);

  function fire(e) {
    var x, y;
    if (e.touches && e.touches.length > 0) {
      x = e.touches[0].clientX;
      y = e.touches[0].clientY;
    } else {
      x = e.clientX;
      y = e.clientY;
    }
    if (typeof x !== 'number' || typeof y !== 'number') return;
    boom(x, y);
    var bx = x, by = y;
    setTimeout(function() { boom(bx + (Math.random()-0.5)*180, by + (Math.random()-0.5)*180); }, 80);
    setTimeout(function() { boom(bx + (Math.random()-0.5)*180, by + (Math.random()-0.5)*180); }, 160);
  }

  document.addEventListener('click', fire);
  document.addEventListener('touchstart', fire);

  // 开场烟花
  setTimeout(function() {
    boom(w * 0.25, h * 0.3);
    boom(w * 0.75, h * 0.35);
    boom(w * 0.5, h * 0.45);
  }, 700);
  setTimeout(function() { boom(w * 0.4, h * 0.5); }, 1400);
  setTimeout(function() { boom(w * 0.6, h * 0.25); }, 2000);
})();
</script>
</body>
</html>
