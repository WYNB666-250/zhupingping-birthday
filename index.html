<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>祝朱平平女士生日快乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    min-height: 100vh;
    overflow-x: hidden;
    background: radial-gradient(ellipse at center, #a8001a 0%, #5c000a 100%);
    font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- 背景装饰 ---- */
  .bg-pattern {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,215,0,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 60%, rgba(255,215,0,0.04) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(255,215,0,0.05) 0%, transparent 40%);
  }

  /* ---- 粒子 canvas ---- */
  #particles {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }

  /* ---- 烟花 canvas ---- */
  #fireworks {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
  }

  /* ---- 主内容 ---- */
  .main-content {
    position: relative; z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    width: 100%;
    max-width: 500px;
  }

  /* ---- 头像区 ---- */
  .avatar-wrapper {
    position: relative;
    width: min(180px, 40vw);
    height: min(180px, 40vw);
    margin-bottom: 30px;
  }

  .avatar-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid transparent;
    background: conic-gradient(from 0deg, #FFD700, #FFF8DC, #DAA520, #FFD700) border-box;
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
    animation: ringRotate 3s linear infinite;
  }

  @keyframes ringRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .avatar-placeholder {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: min(60px, 14vw);
    color: #8B0000;
    font-weight: bold;
    box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,215,0,0.2);
  }

  /* 真实头像用这个覆盖 */
  .avatar-img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,215,0,0.2);
  }

  /* ---- 大字祝福 ---- */
  .blessing {
    text-align: center;
    margin-bottom: 16px;
  }

  .blessing-main {
    font-size: min(48px, 10vw);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.4;
    background: linear-gradient(180deg, #FFF8DC 0%, #FFD700 30%, #DAA520 70%, #B8860B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)) drop-shadow(0 2px 4px rgba(139,0,0,0.5));
    animation: textShine 2s ease-in-out infinite alternate;
  }

  @keyframes textShine {
    0% { filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)) drop-shadow(0 2px 4px rgba(139,0,0,0.5)); }
    100% { filter: drop-shadow(0 0 35px rgba(255,215,0,0.9)) drop-shadow(0 2px 6px rgba(139,0,0,0.7)); }
  }

  .blessing-sub {
    font-size: min(22px, 5vw);
    color: #FFD700;
    margin-top: 12px;
    letter-spacing: 4px;
    opacity: 0.9;
    animation: fadeInUp 1.5s ease-out;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 0.9; transform: translateY(0); }
  }

  /* ---- 底部文案 ---- */
  .footer-msg {
    margin-top: 36px;
    color: rgba(255,215,0,0.7);
    font-size: min(16px, 4vw);
    text-align: center;
    line-height: 1.8;
    letter-spacing: 2px;
    animation: fadeInUp 2s ease-out;
  }

  /* ---- 点击提示 ---- */
  .tap-hint {
    position: fixed; bottom: 30px; z-index: 15;
    color: rgba(255,215,0,0.6);
    font-size: 14px;
    letter-spacing: 2px;
    animation: bounce 1.5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-8px); opacity: 0.8; }
  }

  /* ---- 响应式微调 ---- */
  @media (max-width: 400px) {
    .blessing-main { font-size: 38px; }
    .blessing-sub { font-size: 18px; }
  }

  @media (min-width: 768px) {
    .blessing-main { font-size: 64px; }
    .blessing-sub { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="bg-pattern"></div>
<canvas id="particles"></canvas>
<canvas id="fireworks"></canvas>

<div class="main-content">
  <!-- 头像 -->
  <div class="avatar-wrapper">
    <div class="avatar-ring"></div>
    <img class="avatar-img" src="avatar.jpg" alt="朱平平女士">
  </div>

  <!-- 大字祝福 -->
  <div class="blessing">
    <div class="blessing-main">
      祝福美丽的<br>朱平平女士<br>生日快乐
    </div>
    <div class="blessing-sub">🎂 永远年轻美丽 🎂</div>
  </div>

  <!-- 底部 -->
  <div class="footer-msg">
    愿时光温柔<br>岁月长青
  </div>
</div>

<div class="tap-hint">✨ 点击屏幕放烟花 ✨</div>

<script>
// ====== 浮动粒子 ======
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h;
  const particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 2 + 1,
      speed: Math.random() * 0.5 + 0.2,
      opacity: Math.random() * 0.6 + 0.2,
      phase: Math.random() * Math.PI * 2
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    const t = Date.now() / 1000;
    for (const p of particles) {
      p.y -= p.speed;
      if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
      const alpha = p.opacity * (0.6 + 0.4 * Math.sin(t * 2 + p.phase));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,215,0,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ====== 烟花 ======
(function() {
  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  const fireworks = [];

  function randomColor() {
    const colors = [
      '#FFD700', '#FF6347', '#FF4500', '#FFA500', '#FF69B4',
      '#FF1493', '#FFD700', '#FF4500', '#FFA500', '#FFD700'
    ];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function createFirework(x, y) {
    const count = 40 + Math.floor(Math.random() * 40);
    const particles = [];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const speed = Math.random() * 6 + 2;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: Math.random() * 0.02 + 0.015,
        color: randomColor(),
        size: Math.random() * 2.5 + 1
      });
    }
    fireworks.push(particles);
  }

  function draw(ts) {
    ctx.clearRect(0, 0, w, h);

    for (let i = fireworks.length - 1; i >= 0; i--) {
      const fw = fireworks[i];
      let alive = false;
      for (const p of fw) {
        if (p.life <= 0) continue;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.04; // gravity
        p.life -= p.decay;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('rgb', 'rgba');
        if (p.color.startsWith('#')) {
          const hex = p.color;
          const r = parseInt(hex.slice(1,3), 16);
          const g = parseInt(hex.slice(3,5), 16);
          const b = parseInt(hex.slice(5,7), 16);
          ctx.fillStyle = `rgba(${r},${g},${b},${p.life})`;
        }
        ctx.fill();
      }
      if (!alive) fireworks.splice(i, 1);
    }
    requestAnimationFrame(draw);
  }

  // 点击/触摸放烟花
  function handleTap(e) {
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const x = touch.clientX;
    const y = touch.clientY;
    createFirework(x, y);
    // 多点开花
    for (let i = 0; i < 2; i++) {
      setTimeout(() => {
        createFirework(
          x + (Math.random() - 0.5) * 150,
          y + (Math.random() - 0.5) * 150
        );
      }, i * 80);
    }
  }

  document.addEventListener('click', handleTap);
  document.addEventListener('touchstart', handleTap, { passive: false });

  // 自动开场烟花
  function autoLaunch() {
    createFirework(w * 0.3, h * 0.3);
    createFirework(w * 0.7, h * 0.4);
    createFirework(w * 0.5, h * 0.5);
  }
  setTimeout(autoLaunch, 600);
  setTimeout(() => createFirework(w * 0.4, h * 0.5), 1200);
  setTimeout(() => createFirework(w * 0.6, h * 0.3), 1800);

  draw(0);
})();
</script>
</body>
</html>
